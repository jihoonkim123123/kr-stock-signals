name: 🧪 Strategy Backtest

on:
  schedule:
    - cron: '0 22 * * 5'
  workflow_dispatch:
    inputs:
      universe:
        description: '유니버스'
        type: choice
        default: 'BOTH'
        options: [KOSPI200, KOSDAQ150, BOTH]
      years:
        description: '테스트 기간 (년)'
        default: '15'
      threshold:
        description: '진입 점수 임계값'
        default: '75'

permissions:
  contents: read
  issues: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 수동 실행 옵션 적용 (universe / years / threshold만)
        if: github.event_name == 'workflow_dispatch'
        run: |
          python - << 'EOF'
          import re
          path = "kr_stock_backtest.py"
          src = open(path, encoding="utf-8").read()
          src = re.sub(r'"universe":\s*"[^"]+"', '"universe": "${{ inputs.universe }}"', src)
          src = re.sub(r'"test_years":\s*\d+', '"test_years": ${{ inputs.years }}', src)
          src = re.sub(r'"score_threshold":\s*\d+', '"score_threshold": ${{ inputs.threshold }}', src)
          open(path, "w", encoding="utf-8").write(src)
          print("✅ 옵션 적용 (리스크 설정은 보존)")
          EOF

      - name: 백테스트 실행
        run: python kr_stock_backtest.py | tee backtest_output.txt

      - name: 리포트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ github.run_number }}
          path: |
            backtest_summary.md
            backtest_summary.json
            backtest_trades.csv
            backtest_output.txt
          retention-days: 90
          if-no-files-found: warn

      - name: 결과 이슈 생성
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🧪 백테스트 결과 #${{ github.run_number }}"
          content-filepath: backtest_summary.md
          labels: backtest
