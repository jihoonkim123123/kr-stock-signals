name: 🧪 Strategy Backtest

# 매주 토요일 오전 7시 KST + 수동 실행
on:
  schedule:
    - cron: '0 22 * * 5'   # 금요일 22:00 UTC = 토요일 07:00 KST
  workflow_dispatch:
    inputs:
      universe:
        description: '유니버스 (KOSPI200 / KOSDAQ150 / BOTH)'
        type: choice
        default: 'BOTH'
        options: [KOSPI200, KOSDAQ150, BOTH]
      years:
        description: '테스트 기간 (년)'
        default: '15'
      threshold:
        description: '진입 점수 임계값'
        default: '80'

permissions:
  contents: read
  issues: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 50          # grok: 계산량 증가로 timeout 늘림
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: grok + Dalio 업그레이드 확인
        run: |
          echo "=== kr_stock_backtest.py grok 버전 확인 ==="
          grep -E "GROK|Ray Dalio|grok:" kr_stock_backtest.py || echo "grok 주석 없음"

      - name: CONFIG 오버라이드 (수동 실행 시)
        if: github.event_name == 'workflow_dispatch'
        run: |
          python - << 'EOF'
          import re, os
          path = "kr_stock_backtest.py"
          src = open(path, encoding="utf-8").read()
          
          # grok: 입력값 반영
          src = re.sub(r'"test_years": \d+', f'"test_years": {int("${{ inputs.years }}")}', src)
          src = re.sub(r'"universe": "[^"]+"', f'"universe": "${{ inputs.universe }}"', src)
          src = re.sub(r'"score_threshold": \d+', f'"score_threshold": {int("${{ inputs.threshold }}")}', src)
          
          # grok: 백테스트 강화 옵션 강제 설정
          src = re.sub(r'"max_concurrent": \d+', '"max_concurrent": 18', src)
          src = re.sub(r'"enable_swing": (True|False)', '"enable_swing": True', src)
          
          open(path, "w", encoding="utf-8").write(src)
          print("CONFIG 업데이트 완료 (max_concurrent=18, enable_swing=True)")
          EOF

      - name: 백테스트 실행 (Dalio 업그레이드 버전)
        run: python kr_stock_backtest.py | tee backtest_output.txt

      - name: 요약 추출
        id: summary
        run: |
          echo "### 🧪 백테스트 결과 (grok + Dalio 버전)" > summary.md
          echo "**Run**: #${{ github.run_number }} | **날짜**: $(date)" >> summary.md
          echo '```' >> summary.md
          grep -E "(단기 스윙|장기 추세|승률|기대값|프로핏|누적 수익률|MDD|샤프|Monte Carlo|거래 없음|KOSPI 매수보유)" backtest_output.txt >> summary.md || true
          echo '```' >> summary.md
          cat summary.md

      - name: 리포트 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ github.run_number }}
          path: |
            backtest_report.html
            backtest_trades.csv
            backtest_output.txt
          retention-days: 90

      - name: 결과 이슈 생성
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🧪 백테스트 결과 (grok Dalio #${{ github.run_number }})"
          content-filepath: summary.md
          labels: backtest, grok-dalio
