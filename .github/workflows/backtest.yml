name: 🧪 Strategy Backtest

on:
  schedule:
    - cron: '0 22 * * 5'
  workflow_dispatch:
    inputs:
      universe:
        description: '유니버스'
        type: choice
        default: 'BOTH'
        options: [KOSPI200, KOSDAQ150, BOTH]
      years:
        description: '테스트 기간 (년)'
        default: '15'
      threshold:
        description: '진입 점수 임계값'
        default: '80'

permissions:
  contents: read
  issues: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: grok 버전 확인
        run: grep -E "GROK|Dalio|grok:" kr_stock_backtest.py || echo "grok 주석 미적용"

      - name: CONFIG 강제 오버라이드 (grok Dalio 설정)
        run: |
          python - << 'EOF'
          import re
          path = "kr_stock_backtest.py"
          src = open(path, encoding="utf-8").read()
          src = re.sub(r'"enable_swing": (True|False)', '"enable_swing": True', src)
          src = re.sub(r'"max_concurrent": \d+', '"max_concurrent": 18', src)
          src = re.sub(r'"score_threshold": \d+', '"score_threshold": 80', src)
          open(path, "w", encoding="utf-8").write(src)
          print("✅ grok Dalio CONFIG 적용 완료")
          EOF

      - name: 백테스트 실행
        run: python kr_stock_backtest.py | tee backtest_output.txt

      - name: 요약 추출 (개선됨)
        id: summary
        run: |
          echo "### 🧪 백테스트 결과 (grok + Dalio 버전 #${{ github.run_number }})" > summary.md
          echo "Run Date: $(date)" >> summary.md
          echo '```text' >> summary.md
          grep -E "(단기 스윙|장기 추세|승률|기대값|프로핏|누적 수익률|최대 낙폭|MDD|샤프|거래 없음|Monte Carlo|KOSPI 매수보유)" backtest_output.txt | head -30 >> summary.md || true
          echo '```' >> summary.md
          cat summary.md

      - name: 리포트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: backtest-${{ github.run_number }}
          path: |
            backtest_report.html
            backtest_trades.csv
            backtest_output.txt
          retention-days: 90

      - name: 결과 이슈 생성
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🧪 백테스트 결과 (grok Dalio #${{ github.run_number }})"
          content-filepath: summary.md
          labels: backtest, grok-dalio
