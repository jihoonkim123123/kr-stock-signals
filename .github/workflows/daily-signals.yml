name: 📊 Daily KR Stock Signals v2

on:
  schedule:
    # 평일 오전 8:30 KST (UTC 23:30 일~목)
    - cron: '30 23 * * 0-4'
  workflow_dispatch: # 수동 실행 허용

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: daily-signals
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # v2는 분석 항목이 많아 시간을 조금 더 넉넉히 잡았습니다.
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ✅ DART 기업코드 캐시 보존 (API 호출 절약)
      # dart_financials.py의 CACHE_DIR = .cache 설정과 동기화
      - name: Restore DART cache
        uses: actions/cache@v3
        with:
          path: .cache
          key: dart-corp-code-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            dart-corp-code-${{ runner.os }}-

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 신호 스캔 실행 (v2 Full Stack)
        env:
          # GitHub Secrets에 DART_API_KEY가 등록되어 있어야 합니다.
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          PYTHONUNBUFFERED: "1"
          TZ: Asia/Seoul
        run: |
          python -u kr_stock_signals_v2.py
          echo "--- 작업 후 파일 목록 ---"
          ls -la

      - name: docs 폴더 정리 (배포 준비)
        run: |
          mkdir -p docs
          if [ -f dashboard.html ]; then
            mv dashboard.html docs/index.html
            echo "✓ dashboard.html → docs/index.html"
          else
            echo "❌ dashboard.html 없음"
            ls -la
            exit 1
          fi
          # top.md가 존재할 경우에만 복사
          [ -f top.md ] && cp top.md docs/top.md || echo "⚠️ top.md 없음"

      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: 오늘 날짜 변수 설정
        id: today
        run: echo "date=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: 일일 이슈 생성 (알림용)
        # top.md 파일이 있을 때만 실행
        if: hashFiles('top.md') != ''
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "📊 [v2] 매매 신호 분석 보고서 (${{ steps.today.outputs.date }})"
          content-filepath: top.md
          labels: daily-signal, v2-release

      - name: 작업 결과물 백업 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: signals-v2-${{ steps.today.outputs.date }}
          path: |
            docs/index.html
            top.md
          retention-days: 30

  deploy-pages:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
