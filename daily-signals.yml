name: 📊 Daily KR Stock Signals v4

on:
  schedule:
    - cron: '30 23 * * 0-4'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Restore DART Cache
        uses: actions/cache@v3
        with:
          path: /tmp/dart_cache
          key: dart-corp-code-${{ runner.os }}

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: v4 실행
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          PYTHONUNBUFFERED: "1"
          TZ: Asia/Seoul
        run: |
          python -u kr_stock_signals_v4.py
          ls -la *.html

      - name: docs 폴더 정리
        run: |
          mkdir -p docs
          if [ -f dashboard_v4.html ]; then
            cp dashboard_v4.html docs/index.html
            echo "✅ v4 → docs/index.html"
          elif [ -f dashboard.html ]; then
            cp dashboard.html docs/index.html
          fi

      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: GitHub Pages 배포
        uses: actions/deploy-pages@v4
