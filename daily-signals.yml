요청하신 4가지 변경 사항을 기존 코드에 완벽하게 통합했습니다.

특히 DART 캐시(corpcode.csv) 설정은 API 호출 횟수를 아끼기 위해 매우 중요한데, 이를 위해 actions/cache를 추가하여 /tmp/dart_cache 디렉토리를 보존하도록 구성했습니다.

🛠️ 업데이트된 workflow.yml
YAML
name: 📊 Daily KR Stock Signals

on:
  schedule:
    - cron: '30 23 * * 0-4' # 평일 오전 8:30 KST
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: daily-signals
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # ✅ 4. Python 3.11 설정 (pykrx 및 최신 라이브러리 호환성)
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ✅ 3. DART 캐시 보존 (corpcode.csv 등 재사용)
      - name: Restore DART cache
        uses: actions/cache@v3
        with:
          path: /tmp/dart_cache
          key: dart-corp-code-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            dart-corp-code-${{ runner.os }}-

      - name: 의존성 설치
        run: pip install -r requirements.txt

      # ✅ 1 & 2. 실행 파일 변경 및 DART API 키 추가
      - name: 신호 스캔 실행 (v2)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }} # GitHub Secrets에 등록 필수
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          PYTHONUNBUFFERED: "1"
          TZ: Asia/Seoul
        run: |
          python -u kr_stock_signals_v2.py
          echo "--- 작업 후 파일 목록 ---"
          ls -la

      - name: docs 폴더 정리
        run: |
          mkdir -p docs
          if [ -f dashboard.html ]; then
            mv dashboard.html docs/index.html
            echo "✓ dashboard.html → docs/index.html"
          else
            echo "❌ dashboard.html 없음"
            exit 1
          fi
          [ -f top.md ] && cp top.md docs/top.md || echo "top.md 없음"

      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: 오늘 날짜 변수
        id: today
        run: echo "date=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: 일일 이슈 생성
        if: hashFiles('top.md') != ''
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "📊 매매 신호 ${{ steps.today.outputs.date }}"
          content-filepath: top.md
          labels: daily-signal

  deploy-pages:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
